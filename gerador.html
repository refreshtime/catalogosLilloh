<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lilloh · Gerador de Proposta</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF7F2;
  --warm: #FFFDF9;
  --sand: #C4AE96;
  --sand-l: #E8DDD2;
  --sand-d: #B8977E;
  --mocha: #A69078;
  --charcoal: #3A3632;
  --text: #4A4540;
  --text-l: #8A8279;
  --gold: #C9A96E;
  --fem: #C09090;
  --fem-l: #FDF0F0;
  --mas: #7A9BB5;
  --mas-l: #EEF3F8;
  --neu: #A8B5A0;
  --neu-l: #EEF3EC;
  --admin: #2C2A26;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
html,body{background:var(--cream);font-family:'Jost',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── ADMIN HEADER ── */
.adm-header{background:var(--admin);padding:16px 16px 0;position:sticky;top:0;z-index:50}
.adm-header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;gap:8px}
.adm-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:28px;font-weight:300;color:#fff;letter-spacing:2px;line-height:1}
.adm-badge{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#9B9890;margin-top:3px}
.adm-btns{display:flex;gap:8px;flex-shrink:0}
.btn-cfg{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#ddd;border-radius:10px;padding:10px 14px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:.2s;min-height:44px;display:flex;align-items:center;gap:5px}
.btn-cfg:hover{background:rgba(255,255,255,.2)}

/* ── TABS ── */
.tabs{display:flex;gap:0;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:1;padding:14px 10px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#9B9890;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;background:none;border-top:none;border-left:none;border-right:none;-webkit-tap-highlight-color:transparent;min-height:48px}
.tab-btn:hover{color:#ccc}
.tab-btn.active-fem{color:var(--sand);border-bottom-color:var(--sand)}
.tab-btn.active-mas{color:var(--mas);border-bottom-color:var(--mas)}
.tab-btn.active-neu{color:var(--neu);border-bottom-color:var(--neu)}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--warm);border-bottom:1px solid var(--sand-l);gap:10px}
.toolbar-left{display:flex;gap:8px;align-items:center}
.btn-sel{font-size:13px;font-weight:600;padding:10px 16px;border-radius:22px;cursor:pointer;border:1.5px solid var(--sand-d);background:transparent;color:var(--mocha);transition:.2s;font-family:'Jost',sans-serif;min-height:44px}
.btn-sel:hover{background:var(--sand);color:#fff}
.btn-desel{font-size:13px;font-weight:600;padding:10px 16px;border-radius:22px;cursor:pointer;border:1.5px solid #ddd;background:transparent;color:var(--text-l);font-family:'Jost',sans-serif;transition:.2s;min-height:44px}
.btn-desel:hover{background:#eee}
.toolbar-count{font-size:13px;color:var(--text-l);font-weight:400;white-space:nowrap}
.toolbar-count strong{color:var(--charcoal);font-weight:700}

/* ── PANELS ── */
.panel{display:none;padding:16px 14px 130px}
.panel.active{display:block}

/* ── KIT GRID ── */
.kits-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(min-width:500px){.kits-grid{grid-template-columns:1fr 1fr 1fr}}

/* ── KIT CARD ── */
.kit-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 16px rgba(58,54,50,.09);transition:.25s;position:relative;border:2.5px solid transparent}
.kit-card.selected{border-color:var(--sand-d)}
.kit-card.selected-mas{border-color:var(--mas)}
.kit-card.selected-neu{border-color:var(--neu)}

.kit-img{position:relative;width:100%;aspect-ratio:4/5;overflow:hidden;cursor:pointer}
.kit-img img{width:100%;height:100%;object-fit:cover;transition:.4s}
.kit-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--sand-l) 0%,#e0d5c8 100%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--mocha);text-align:center;padding:10px}

.kit-check{position:absolute;top:9px;right:9px;width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.9);background:rgba(255,255,255,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;z-index:2;font-size:15px;font-weight:700}
.kit-card.selected .kit-check,
.kit-card.selected-mas .kit-check,
.kit-card.selected-neu .kit-check{background:var(--sand-d);border-color:var(--sand-d);color:#fff}
.kit-card.selected-mas .kit-check{background:var(--mas);border-color:var(--mas)}
.kit-card.selected-neu .kit-check{background:var(--neu);border-color:var(--neu)}

.kit-info{padding:11px 12px 10px}
.kit-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--charcoal);margin-bottom:3px;line-height:1.2}
.kit-price{font-size:15px;font-weight:700;color:var(--mocha);margin-bottom:6px}
.kit-items{font-size:11px;color:var(--text-l);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.kit-actions{display:flex;gap:6px;padding:0 10px 12px}
.btn-edit{flex:1;background:var(--warm);border:1px solid var(--sand-l);color:var(--mocha);font-family:'Jost',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;padding:10px 0;border-radius:10px;cursor:pointer;transition:.2s;text-transform:uppercase;min-height:44px}
.btn-edit:hover{background:var(--sand-l);border-color:var(--sand)}
.btn-toggle{flex:1;border:1px solid var(--sand-l);font-family:'Jost',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;padding:10px 0;border-radius:10px;cursor:pointer;transition:.2s;text-transform:uppercase;min-height:44px}
.btn-toggle-in{background:var(--sand-d);border-color:var(--sand-d);color:#fff}
.btn-toggle-in.mas{background:var(--mas);border-color:var(--mas)}
.btn-toggle-in.neu{background:var(--neu);border-color:var(--neu)}
.btn-toggle-out{background:transparent;color:var(--text-l)}
.btn-toggle-out:hover{background:#f5f5f5}

/* ── FLOAT BAR ── */
.float-bar{position:fixed;bottom:0;left:0;right:0;background:var(--charcoal);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:40;box-shadow:0 -4px 24px rgba(0,0,0,.2)}
.float-left{display:flex;flex-direction:column;gap:1px}
.float-info{color:#aaa;font-size:12px;font-weight:400}
.float-count{color:#fff;font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;line-height:1}
.btn-gerar{background:var(--sand-d);color:#fff;border:none;font-family:'Jost',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:15px 24px;border-radius:12px;cursor:pointer;transition:.2s;white-space:nowrap;min-height:52px}
.btn-gerar:hover{background:var(--mocha)}
.btn-gerar:disabled{background:#555;cursor:not-allowed}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:28px 22px 44px;width:100%;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--charcoal);margin-bottom:20px}
.modal-img-preview{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:12px;margin-bottom:14px;background:linear-gradient(135deg,var(--sand-l),#e0d5c8);display:block}
.modal-img-placeholder{width:100%;aspect-ratio:4/3;border-radius:12px;margin-bottom:14px;background:linear-gradient(135deg,var(--sand-l),#e0d5c8);display:flex;align-items:center;justify-content:center;color:var(--mocha);font-size:14px;font-weight:500}
.field-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-l);margin-bottom:7px;display:block}
.field-input{width:100%;border:1.5px solid #e0ddd8;border-radius:10px;padding:13px 14px;font-family:'Jost',sans-serif;font-size:15px;color:var(--charcoal);margin-bottom:16px;outline:none;transition:.2s}
.field-input:focus{border-color:var(--mocha)}
.field-textarea{width:100%;border:1.5px solid #e0ddd8;border-radius:10px;padding:13px 14px;font-family:'Jost',sans-serif;font-size:14px;color:var(--charcoal);margin-bottom:22px;resize:vertical;min-height:90px;outline:none;transition:.2s;line-height:1.6}
.field-textarea:focus{border-color:var(--mocha)}
.modal-actions{display:flex;gap:10px}
.btn-save{flex:1;background:var(--charcoal);color:#fff;border:none;font-family:'Jost',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:16px;border-radius:12px;cursor:pointer;min-height:52px}
.btn-cancel{background:#f0f0ee;color:var(--text-l);border:none;font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:16px 20px;border-radius:12px;cursor:pointer;min-height:52px}

/* ── CONFIG PANEL ── */
.cfg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end}
.cfg-overlay.open{display:flex}
.cfg-panel{background:#fff;border-radius:22px 22px 0 0;padding:28px 22px 52px;width:100%;max-height:90vh;overflow-y:auto}
.cfg-title{font-size:17px;font-weight:700;color:var(--charcoal);margin-bottom:6px}
.cfg-sub{font-size:13px;color:var(--text-l);margin-bottom:22px;line-height:1.6}
.cfg-hint{font-size:12px;color:var(--text-l);margin-top:-10px;margin-bottom:16px;padding:10px 14px;background:#f8f8f6;border-radius:8px;line-height:1.6}
</style>
</head>

<!-- ADMIN HEADER -->
<div class="adm-header">
  <div class="adm-header-top">
    <div>
      <div class="adm-logo">Lilloh</div>
      <div class="adm-badge">Gerador de Propostas</div>
    </div>
    <div class="adm-btns">
    <button class="btn-cfg" onclick="salvarArquivo()" style="background:var(--sand-d);border-color:var(--sand-d);color:#fff">💾 Salvar</button>
    <button class="btn-cfg" onclick="openConfig()">⚙ Config</button>
  </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active-fem" id="tab-feminino" onclick="switchTab('feminino')">Feminino</button>
    <button class="tab-btn" id="tab-masculino" onclick="switchTab('masculino')">Masculino</button>
    <button class="tab-btn" id="tab-neutro" onclick="switchTab('neutro')">Neutro</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left">
    <button class="btn-sel" id="btn-sel-all" onclick="selecionarTodos()">Selecionar todos</button>
    <button class="btn-desel" onclick="desmarcarTodos()">Desmarcar todos</button>
  </div>
  <div class="toolbar-count" id="toolbar-count"></div>
</div>

<!-- PANELS -->
<div class="panel active" id="panel-feminino"><div class="kits-grid" id="grid-feminino"></div></div>
<div class="panel" id="panel-masculino"><div class="kits-grid" id="grid-masculino"></div></div>
<div class="panel" id="panel-neutro"><div class="kits-grid" id="grid-neutro"></div></div>

<!-- FLOAT BAR -->
<div class="float-bar">
  <div class="float-left">
    <span class="float-count" id="float-count">0</span>
    <span class="float-info">kits selecionados</span>
  </div>
  <button class="btn-gerar" id="btn-gerar" onclick="gerarProposta()">Gerar Proposta</button>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="overlay-edit" onclick="closeEdit(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-kit-name">—</div>
    <div id="modal-img-area"></div>
    <input type="file" accept="image/*" id="modal-file-input" style="display:none" onchange="previewUpload(this)">
    <button onclick="document.getElementById('modal-file-input').click()" style="width:100%;background:var(--warm);border:2px dashed var(--sand-d);color:var(--mocha);font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;padding:16px;border-radius:12px;cursor:pointer;margin-bottom:16px;min-height:52px">
      📷 Trocar foto
    </button>
    <label class="field-label">Preço</label>
    <input class="field-input" id="modal-price" type="text" placeholder="R$ 000,00">
    <label class="field-label">Itens do Kit</label>
    <textarea class="field-textarea" id="modal-items" placeholder="Cueiro · Manta em Tricot · ..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- CONFIG PANEL -->
<div class="cfg-overlay" id="overlay-cfg" onclick="closeCfg(event)">
  <div class="cfg-panel" onclick="event.stopPropagation()">
    <div class="cfg-title">Configurações</div>
    <div class="cfg-sub">Defina a URL base do seu repositório no GitHub Pages. Isso garante que as fotos apareçam corretamente na proposta enviada ao cliente.</div>
    <label class="field-label">URL Base do Repositório</label>
    <input class="field-input" id="cfg-base-url" type="text" placeholder="https://refreshtime.github.io/lilloh">
    <div class="cfg-hint">Exemplo: <strong>https://seuusuario.github.io/lilloh</strong><br>As fotos devem estar na pasta <code>/images/</code> do repositório.</div>
    <label class="field-label">Nome exibido na proposta (cliente)</label>
    <input class="field-input" id="cfg-signature" type="text" placeholder="Lilloh Baby Gifts · @lillohbabygifts">
    <label class="field-label">WhatsApp (com DDI, sem +)</label>
    <input class="field-input" id="cfg-whatsapp" type="text" placeholder="5511942748600">
    <label class="field-label">Imagem de capa (Hero) — URL</label>
    <input class="field-input" id="cfg-hero-img" type="text" placeholder="https://...github.io/lilloh/images/hero.jpg">
    <label class="field-label">Imagem da seção Sobre — URL</label>
    <input class="field-input" id="cfg-about-img" type="text" placeholder="https://...github.io/lilloh/images/sobre.jpg">
    <label class="field-label">Imagem Corporativo — URL</label>
    <input class="field-input" id="cfg-corp-img" type="text" placeholder="https://...github.io/lilloh/images/corporativo.jpg">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCfg()">Cancelar</button>
      <button class="btn-save" onclick="saveCfg()">Salvar</button>
    </div>
  </div>
</div>

//  ESTADO
// ─────────────────────────────────────
var currentTab = 'feminino';
var editingId = null;
var STATE = { baseUrl: 'https://refreshtime.github.io/catalogosLilloh', signature: 'Lilloh Baby Gifts · @lillohbabygifts', whatsapp: '5511942748600', heroImgUrl: '', aboutImgUrl: '', corpImgUrl: '', kits: [] };

function loadState() {
  var saved = localStorage.getItem('lilloh_state');
  // arquivo salvo tem estado embutido — tem prioridade
  if (window.LILLOH_SAVED_STATE) {
    var parsed = window.LILLOH_SAVED_STATE;
    applyParsed(parsed);
    saveState(); // sincroniza com localStorage
    return;
  }
  if (saved) {
    try {
      var parsed = JSON.parse(saved);
      applyParsed(parsed);
    } catch(e) {
      initKits();
    }
  } else {
    initKits();
  }
}

function applyParsed(parsed) {
  STATE.baseUrl    = parsed.baseUrl    || STATE.baseUrl;
  STATE.signature  = parsed.signature  || STATE.signature;
  STATE.whatsapp   = parsed.whatsapp   || STATE.whatsapp;
  STATE.heroImgUrl = parsed.heroImgUrl || '';
  STATE.aboutImgUrl= parsed.aboutImgUrl|| '';
  STATE.corpImgUrl = parsed.corpImgUrl || '';
  var overrides = parsed.kits || {};
  STATE.kits = KITS_DEFAULT.map(function(k) {
    var over = overrides[k.id] || {};
    return {
      id: k.id, cat: k.cat,
      name:     over.name     || k.name,
      price:    over.price    || k.price,
      items:    over.items    || k.items,
      imageUrl: (over.imageUrl !== undefined && over.imageUrl !== '') ? over.imageUrl : k.imageUrl,
      selected: over.selected !== undefined ? over.selected : true
    };
  });
}

function initKits() {
  STATE.kits = KITS_DEFAULT.map(function(k) {
    return { id:k.id, cat:k.cat, name:k.name, price:k.price, items:k.items, imageUrl:k.imageUrl, selected:true };
  });
}

function saveState() {
  var overrides = {};
  STATE.kits.forEach(function(k) { overrides[k.id] = { name:k.name, price:k.price, items:k.items, imageUrl:k.imageUrl, selected:k.selected }; });
  localStorage.setItem('lilloh_state', JSON.stringify({ baseUrl:STATE.baseUrl, signature:STATE.signature, whatsapp:STATE.whatsapp, heroImgUrl:STATE.heroImgUrl, aboutImgUrl:STATE.aboutImgUrl, corpImgUrl:STATE.corpImgUrl, kits:overrides }));
}

function getKit(id) {
  for (var i = 0; i < STATE.kits.length; i++) { if (STATE.kits[i].id === id) return STATE.kits[i]; }
  return null;
}

// ─────────────────────────────────────
//  RENDER
// ─────────────────────────────────────
function render() {
  ['feminino','masculino','neutro'].forEach(function(cat) {
    var grid = document.getElementById('grid-' + cat);
    var kits = STATE.kits.filter(function(k){ return k.cat === cat; });
    grid.innerHTML = kits.map(function(k){ return renderCard(k); }).join('');
  });
  updateCounts();
}

function renderCard(k) {
  var imgHtml;
  var url = resolveUrl(k.imageUrl);
  if (url) {
    imgHtml = '<img src="'+url+'" alt="'+k.name+'" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
            + '<div class="kit-img-placeholder" style="display:none">'+k.name+'</div>';
  } else {
    imgHtml = '<div class="kit-img-placeholder">'+k.name+'</div>';
  }
  var selClass = '';
  if (k.selected) {
    if (k.cat === 'feminino') selClass = 'selected';
    else if (k.cat === 'masculino') selClass = 'selected-mas';
    else selClass = 'selected-neu';
  }
  var checkIcon = k.selected ? '✓' : '';
  var toggleLabel = k.selected ? 'Remover' : 'Incluir';
  var toggleClass = k.selected ? ('btn-toggle-in' + (k.cat==='masculino'?' mas':k.cat==='neutro'?' neu':'')) : 'btn-toggle-out';

  return '<div class="kit-card '+selClass+'" id="card-'+k.id+'">'
    + '<div class="kit-img" onclick="toggleSelect(\''+k.id+'\')">'
    + imgHtml
    + '<div class="kit-check" onclick="event.stopPropagation();toggleSelect(\''+k.id+'\')">'+checkIcon+'</div>'
    + '</div>'
    + '<div class="kit-info">'
    + '<div class="kit-name">'+k.name+'</div>'
    + '<div class="kit-price">'+k.price+'</div>'
    + '<div class="kit-items">'+k.items+'</div>'
    + '</div>'
    + '<div class="kit-actions">'
    + '<button class="btn-edit" onclick="openEdit(\''+k.id+'\')">✏ Editar</button>'
    + '<button class="btn-toggle '+toggleClass+'" onclick="toggleSelect(\''+k.id+'\')">'+toggleLabel+'</button>'
    + '</div>'
    + '</div>';
}

function resolveUrl(url) {
  if (!url) return '';
  if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('data:')) return url;
  if (STATE.baseUrl) return STATE.baseUrl.replace(/\/$/, '') + '/' + url.replace(/^\//, '');
  return url;
}

function updateCounts() {
  var catKits = STATE.kits.filter(function(k){ return k.cat === currentTab; });
  var catSel = catKits.filter(function(k){ return k.selected; }).length;
  var totalSel = STATE.kits.filter(function(k){ return k.selected; }).length;
  document.getElementById('toolbar-count').innerHTML = '<strong>'+catSel+' de '+catKits.length+'</strong> nesta aba';
  document.getElementById('float-count').textContent = totalSel;
  document.getElementById('btn-gerar').disabled = totalSel === 0;
}

// ─────────────────────────────────────
//  TABS
// ─────────────────────────────────────
function switchTab(cat) {
  currentTab = cat;
  ['feminino','masculino','neutro'].forEach(function(c) {
    document.getElementById('panel-'+c).classList.toggle('active', c===cat);
    var btn = document.getElementById('tab-'+c);
    btn.className = 'tab-btn';
    if (c === cat) btn.classList.add('active-'+cat);
  });
  updateCounts();
}

// ─────────────────────────────────────
//  SELEÇÃO
// ─────────────────────────────────────
function toggleSelect(id) {
  var k = getKit(id);
  if (!k) return;
  k.selected = !k.selected;
  saveState();
  var card = document.getElementById('card-'+id);
  if (card) {
    var newHtml = renderCard(k);
    var tmp = document.createElement('div');
    tmp.innerHTML = newHtml;
    card.parentNode.replaceChild(tmp.firstElementChild, card);
  }
  updateCounts();
}

function selecionarTodos() {
  STATE.kits.forEach(function(k) { if (k.cat === currentTab) k.selected = true; });
  saveState();
  render();
}

function desmarcarTodos() {
  STATE.kits.forEach(function(k) { if (k.cat === currentTab) k.selected = false; });
  saveState();
  render();
}

// ─────────────────────────────────────
//  EDIÇÃO
// ─────────────────────────────────────
function openEdit(id) {
  var k = getKit(id);
  if (!k) return;
  editingId = id;
  document._pendingImage = null;
  document.getElementById('modal-kit-name').textContent = k.name;
  document.getElementById('modal-price').value = k.price || '';
  document.getElementById('modal-items').value = k.items || '';
  document.getElementById('modal-file-input').value = '';
  var area = document.getElementById('modal-img-area');
  var url = resolveUrl(k.imageUrl);
  area.innerHTML = url
    ? '<img class="modal-img-preview" src="'+url+'" alt="'+k.name+'">'
    : '<div class="modal-img-placeholder">Sem foto — clique em Trocar foto</div>';
  document.getElementById('overlay-edit').classList.add('open');
}

function previewUpload(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document._pendingImage = e.target.result;
    document.getElementById('modal-img-area').innerHTML =
      '<img class="modal-img-preview" src="'+e.target.result+'" alt="prévia">';
  };
  reader.readAsDataURL(input.files[0]);
}

function closeEdit(e) {
  if (!e || e.target === document.getElementById('overlay-edit')) {
    document.getElementById('overlay-edit').classList.remove('open');
    editingId = null;
  }
}

function saveEdit() {
  var k = getKit(editingId);
  if (!k) return;
  if (document._pendingImage) {
    k.imageUrl = document._pendingImage;
    document._pendingImage = null;
  }
  k.price = document.getElementById('modal-price').value.trim() || k.price;
  k.items = document.getElementById('modal-items').value.trim() || k.items;
  saveState();
  var card = document.getElementById('card-'+k.id);
  if (card) {
    var tmp = document.createElement('div');
    tmp.innerHTML = renderCard(k);
    card.parentNode.replaceChild(tmp.firstElementChild, card);
  }
  document.getElementById('overlay-edit').classList.remove('open');
  editingId = null;
}

}

  });

  var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  html = html.replace(/<script>window\.LILLOH_SAVED_STATE[^<]*<\/script>\n?/, '');
